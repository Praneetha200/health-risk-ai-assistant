<!DOCTYPE html>
<html>
<head>

<title>Edit Patient</title>

<link
rel="stylesheet"
href="{{ url_for('static',filename='style.css') }}"
>

</head>
<body>

<div class="form-container">

<h1>✏ Edit Patient</h1>

<form method="POST">

<input
type="text"
name="full_name"
value="{{ patient.full_name }}"
required
>

<input
type="date"
name="dob"
value="{{ patient.dob }}"
required
>

<input
type="email"
name="email"
value="{{ patient.email }}"
required
>

<input
type="number"
step="0.01"
name="glucose"
value="{{ patient.glucose }}"
required
>

<input
type="number"
step="0.01"
name="haemoglobin"
value="{{ patient.haemoglobin }}"
required
>

<input
type="number"
step="0.01"
name="cholesterol"
value="{{ patient.cholesterol }}"
required
>

<button type="submit">

💾 Update Patient

</button>

</form>

</div>

</body>
</html>
